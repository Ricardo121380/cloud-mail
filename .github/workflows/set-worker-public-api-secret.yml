name: Set Cloud Mail public API Worker secret

on:
  workflow_dispatch:

jobs:
  set-secret:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUBLIC_API_TOKEN: ${{ secrets.CLOUDMAIL_PUBLIC_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install worker dependencies
        working-directory: mail-worker
        run: pnpm install --frozen-lockfile
      - name: Store public API token as a Worker secret
        working-directory: mail-worker
        run: |
          set -euo pipefail
          test -n "$PUBLIC_API_TOKEN"
          printf '%s' "$PUBLIC_API_TOKEN" | pnpm wrangler secret put PUBLIC_API_TOKEN --name cloud-mail
          echo "WORKER_PUBLIC_API_SECRET_SET=true"
