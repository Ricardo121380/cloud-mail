name: Rotate Cloud Mail public API token

on:
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
      PUBLIC_API_TOKEN: ${{ secrets.CLOUDMAIL_PUBLIC_API_TOKEN }}
    steps:
      - name: Replace the KV-backed public API token
        run: |
          set -euo pipefail
          test -n "$PUBLIC_API_TOKEN"
          api="https://api.cloudflare.com/client/v4"
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          if [ -z "$KV_NAMESPACE_ID" ]; then
            KV_NAMESPACE_ID=$(curl -fsS "${auth[@]}" \
              "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces?per_page=100" \
              | jq -er '.result[] | select(.title == "cloud-mail") | .id')
          fi

          curl -fsS -X PUT "${auth[@]}" \
            --data-binary "$PUBLIC_API_TOKEN" \
            "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$KV_NAMESPACE_ID/values/public_key%3A" \
            >/dev/null
          echo "PUBLIC_API_TOKEN_ROTATED=true"
