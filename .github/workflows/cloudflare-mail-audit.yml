name: Audit Cloudflare mail routing

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit Cloudflare DNS and Email Routing
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=(-H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")

          zone_json=$(curl -fsS "${auth[@]}" -G "$api/zones" --data-urlencode "name=142857142.xyz")
          zone_id=$(jq -er '.result[0].id' <<<"$zone_json")
          echo "ZONE_FOUND=true"

          echo "MX_RECORDS:"
          curl -fsS "${auth[@]}" -G "$api/zones/$zone_id/dns_records" --data-urlencode "type=MX" --data-urlencode "per_page=100" |
            jq -c '[.result[] | {name,content,priority,ttl}]'

          echo "EMAIL_ROUTING_SETTINGS:"
          curl -fsS "${auth[@]}" "$api/zones/$zone_id/email/routing" |
            jq -c '{success,result}'

          echo "EMAIL_ROUTING_RULES:"
          curl -fsS "${auth[@]}" "$api/zones/$zone_id/email/routing/rules" |
            jq -c '[.result[] | {
              id,
              name,
              enabled,
              matchers:[.matchers[] | {type,field,value}],
              actions:[.actions[] | if .type == "worker" then {type,value} else {type,value:["REDACTED"]} end]
            }]'

          echo "WORKER_SCRIPTS:"
          curl -fsS "${auth[@]}" "$api/accounts/$CF_ACCOUNT_ID/workers/scripts" |
            jq -c '[.result[] | .id]'
