name: Prepare new Cloud Mail admin

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN: ${{ secrets.ADMIN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install worker dependencies
        working-directory: mail-worker
        run: pnpm install --frozen-lockfile
      - name: Disable required invite code and verify settings
        working-directory: mail-worker
        run: |
          set -euo pipefail
          pnpm wrangler d1 execute cloud-mail --remote --command \
            "UPDATE setting SET register = 0, reg_key = 1;"
          sql="SELECT register AS register_mode, reg_key AS reg_key_mode FROM setting LIMIT 1;"
          pnpm wrangler d1 execute cloud-mail --remote --json --command "$sql" \
            | jq -c '.[0].results[0]'
