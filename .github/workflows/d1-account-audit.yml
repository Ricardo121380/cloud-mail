name: Audit Cloud Mail account state

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ADMIN: ${{ secrets.ADMIN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4.1.0
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install worker dependencies
        working-directory: mail-worker
        run: pnpm install --frozen-lockfile
      - name: Audit database without exposing accounts
        working-directory: mail-worker
        run: |
          set -euo pipefail
          admin_sql=${ADMIN//\'/\'\'}
          sql="SELECT
            (SELECT COUNT(*) FROM user) AS user_count,
            (SELECT COUNT(*) FROM user WHERE is_del = 0) AS active_user_count,
            (SELECT COUNT(*) FROM user WHERE email = '$admin_sql' AND is_del = 0) AS configured_admin_exists,
            (SELECT COUNT(*) FROM email) AS email_count,
            (SELECT register FROM setting LIMIT 1) AS register_mode,
            (SELECT reg_key FROM setting LIMIT 1) AS reg_key_mode;"
          pnpm wrangler d1 execute cloud-mail --remote --json --command "$sql" \
            | jq -c '.[0].results[0]'
