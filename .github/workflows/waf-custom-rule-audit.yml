name: Audit Cloud Mail WAF custom rules access

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Read the custom WAF ruleset entrypoint
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"
          auth=(-H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json")
          zone=$(curl -fsS "${auth[@]}" -G "$api/zones" --data-urlencode "name=142857142.xyz" | jq -er '.result[0].id')
          curl -fsS "${auth[@]}" \
            "$api/zones/$zone/rulesets/phases/http_request_firewall_custom/entrypoint" \
            | jq -c '{success,entrypoint_id:.result.id,phase:.result.phase,rule_count:(.result.rules|length)}'
